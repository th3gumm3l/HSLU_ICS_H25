<html>
<head>
	<meta charset="utf8"/>
	<title>Übung 3: Gesamtwiderstandsberechnung</title>
	<script>
		function calculateResistance(r1, r2, wiring) {
			let result = 0;

			if (wiring === "serial"){
				result = r1 + r2;
			}
			else if (wiring === "parallel"){
				result = (r1 * r2)/(r1 + r2);
			}
			return result;
		}
	</script>
</head>

<body>
	<p>Die Ausgabe erfolgt im Console-Log: F12</p>
	<script>
		console.log('Serial:' + calculateResistance(100, 50, "serial"));
		console.log('Parallel' + calculateResistance(100, 50, "parallel"));
	</script>
</body>

</html>
