<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="utf-8">
    <title>Übung 3: Gesamtwiderstandsberechnung</title>
    <script>
		function calculateResistance(r1, r2, wiring) {
			let result = 0;

			if (wiring === "serial"){
				result = r1 + r2;
			}
			else if (wiring === "parallel"){
				result = (r1 * r2)/(r1 + r2);
			}
			return result;
		}

		function calculate() {
			let r1 = parseFloat(document.getElementById('r1').value);
			let r2 = parseFloat(document.getElementById('r2').value);

			let wiring = '';
			if (document.getElementById('serial').checked) {
				wiring = 'serial';
			} else if (document.getElementById('parallel').checked) {
				wiring = 'parallel';
			}

			let result = calculateResistance(r1, r2, wiring);

			document.getElementById('output').innerText = result;
		}

		function validateR1() {
			let val = document.getElementById('r1').value;
			if (val === '' || isNaN(val)) {
				document.getElementById('errorR1').innerText = 'Bitte einen gültigen Wert für R1 eingeben.';
			} else if (parseFloat(val) < 0) {
				document.getElementById('errorR1').innerText = 'R1 darf nicht negativ sein.';
			}
		}

		function validateR2() {
			let val = document.getElementById('r2').value;
			if (val === '' || isNaN(val)) {
				document.getElementById('errorR2').innerText = 'Bitte einen gültigen Wert für R2 eingeben.';
			} else if (parseFloat(val) < 0) {
				document.getElementById('errorR2').innerText = 'R2 darf nicht negativ sein.';
			}
		}

		function validateWiring() {
			if (!document.getElementById('serial').checked && !document.getElementById('parallel').checked) {
				document.getElementById('errorWiring').innerText = 'Bitte eine Schaltung auswählen.';
			}
		}

        function clearValidationErrors() {
            document.getElementById('errorR1').innerText = '';
			document.getElementById('errorR2').innerText = '';
            document.getElementById('errorWiring').innerText = '';
        }

        function hasValidationErrors() {            
            return document.getElementById('errorR1').innerText !== ''
                || document.getElementById('errorR2').innerText !== ''
                || document.getElementById('errorWiring').innerText !== '';
        }
		
        function validateAndCalculate() {
            clearValidationErrors();
			validateR1();
			validateR2();
			validateWiring();
            if (!hasValidationErrors()) {                
                calculate();              
            }
        }
    </script>
</head>
<body>

<h2>Berechnung Gesamtwiderstand</h2>
	<main>
		<fieldset>
			<legend><strong>Widerstände</strong></legend>
			<label for="r1">R1:</label>
			<br>
			<input id="r1" type="number">
			<br>
			<p id="errorR1" class=".error"></p>
			<label for="r2">R2:</label>
			<br>
			<input id="r2" type="number">
			<p id="errorR2" class=".error"></p>
		</fieldset>
		<fieldset>
			<legend><strong>Schaltung</strong></legend>
			<label for="serial">Seriell:</label><br>
			<input id="serial" type="radio" name="wiring" value="serial">
			<br>
			<label for="parallel">Parallel:</label><br>
			<input id="parallel" type="radio" name="wiring" value="parallel">
			<p id="errorWiring" class=".error"></p>
		</fieldset>

        <fieldset>
            <legend><strong>Berechnung</strong></legend>
            <p>Gesamtwiderstand: <span id="output"></span></p>

        </fieldset>
		<fieldset>
			<legend><strong>Berechnen</strong></legend>
			<button type="button" onclick="validateAndCalculate()">Berechne Gesamtwiderstand</button>
		</fieldset>
	</main>
</body>

</html>
