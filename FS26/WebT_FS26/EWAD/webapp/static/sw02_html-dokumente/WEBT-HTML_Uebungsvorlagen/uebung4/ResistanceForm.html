<!DOCTYPE html>
<html lang="de">

<head>
	<meta charset="utf-8">
	<title>Übung 4: Gesamtwiderstandsberechnung</title>
</head>

<body>
<h2>Berechnung Gesamtwiderstand</h2>
<form>
	<fieldset>
		<legend><strong>Widerstände</strong></legend>

		<label for="r1">R1:</label>
		<input type="number" id="r1">
		<br>

		<label for="r2">R2:</label>
		<input type="number" id="r2">
	</fieldset>

	<fieldset>
		<legend><strong>Schaltung</strong></legend>

		<label for="seriell">Seriell:</label>
		<br>
		<input type="radio" name="schaltung" id="seriell" value="seriell">
		<br>

		<label for="parallel">Parallel:</label>
		<br>
		<input type="radio" name="schaltung" id="parallel" value="parallel">
	</fieldset>

	<fieldset>
		<legend><strong>Berechnen</strong></legend>
		<button>Berechne Gesamtwiderstand</button>
	</fieldset>
</form>
</body>

</html>
