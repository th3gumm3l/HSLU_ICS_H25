<!DOCTYPE html>
<html>

<head>
    <title>Übung 2: Zufallszahl: Integration in Backend</title>
    <meta charset="utf8">
    <style>
        .red { color:red; }
        .green { color:green; }
    </style>

    <script>        
    async function showRandomNumber(min, max) {
        try {
            const response = await fetch(`backend_random?min=${min}&max=${max}`, {
                method: 'GET',
                signal: AbortSignal.timeout(5000)
            });

            if (response.ok) {
                const obj = JSON.parse(await response.text());
                updateDocument(obj);
            } else {
                throw(`HTTP status code: ${response.status}`);
            }
        } catch (error) {
            alert(`fetch failed: ${error}`);
        }
    }

    function updateDocument(response) {
        let random = document.getElementById('random');
        random.innerText = response.random;
        if (response.color == 'green') {
            random.classList.remove('red');
            random.classList.add('green');
        } else {
            random.classList.remove('green');
            random.classList.add('red');
        }
    }
    </script>
</head>

<body>
    <p id="random">bisher noch keine Zufallszahl vorliegend.</p>
    <button onclick="showRandomNumber(1, 100)">Berechne Zufallszahl</button>
</body>

</html>
