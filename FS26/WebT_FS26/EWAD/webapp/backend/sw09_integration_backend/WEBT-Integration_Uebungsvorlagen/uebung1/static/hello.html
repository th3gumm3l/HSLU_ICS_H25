<!DOCTYPE html>
<html>

<head>
    <meta charset="utf8">
    <title>Übung 1: Hello World mit Fetch und JSON</title>
</head>

<body>
    <h1>Übung 1: Hello World mit Fetch und JSON</h1>
    
    <p>Mitteilung: <span id="message"></span></p>
    <button onclick="doRequest()">Zeige Mitteilung</button>
    <script>
        async function doRequest() {            
            try {
                const response = await fetch('hello.json', {
                    method: 'GET',
                    signal: AbortSignal.timeout(5000)
                });

                if (response.ok) {
                    const obj = JSON.parse(await response.text());
                    document.getElementById('message').innerText = obj.message;
                } else {
                    throw(`HTTP status code: ${response.status}`);
                }
            } catch (error) {
                alert(`fetch failed: ${error}`); 
            }
        }
    </script>
</body>

</html>
