<!DOCTYPE html>
<html>

<head>
  <title>Übung 2: Responsive Navigationsleiste</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
</head>

<body>
  <nav class="w3-bar w3-blue w3-hide-small">
    <a href="https://www.hslu.ch" class="w3-bar-item w3-button">HSLU</a>

  </nav>
  <nav class="w3-bar-block w3-blue w3-small w3-hide-medium w3-hide-large">
    <a href="https://www.hslu.ch" class="w3-bar-item w3-button">HSLU</a>
    <a href="https://elearning.hslu.ch/ilias" class="w3-bar-item w3-button">ILIAS</a>
    <a href="https://mycampus.hslu.ch" class="w3-bar-item w3-button">MyCampus</a>
  </nav>

</body>

</html>
