<!DOCTYPE html>
<html lang="de">

<head>
	<meta charset="UTF-8">
	<title>Kontakt</title>

	<!-- TODO: Einbinden des Stylesheets -->

</head>

<body>

	<h2>Kontakt</h2>
	<p>
		Senden Sie uns einfach eine Mail über das Kontaktformular und stellen Sie Ihre Fragen.<br>
		Wir werden uns dann bei Ihnen melden.
	</p>
	<h3>Mail an:</h3>

	<form>
		<fieldset>
			<legend>Ansprechpartner</legend>

			<label for="author">Name:</label>
			<input id="author" type="text" size="20" value="">

			<label for="betreff">Betreff:</label>
			<input id="betreff" type="text" size="20" value="">

			<label for="mail">E-Mail Adresse:</label>
			<input id="mail" type="text" size="20" value="">
		</fieldset>

		<fieldset>
			<legend>Text</legend>
			<label for="nachricht">Ihre Nachricht:</label><br>
			<textarea id="nachricht" rows="10" cols="30"></textarea>
		</fieldset>

		<fieldset>
			<legend>Mail senden</legend>
			<button>Senden</button>
		</fieldset>

	</form>
</body>

</html>
