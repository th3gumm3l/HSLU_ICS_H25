<!DOCTYPE html>
<html>

<head>
    <title>Übung 1: Dynamisches HTML</title>
    <meta charset="utf8">
    <script>
        function onClick() {
            let output = document.getElementById('output');
            output.innerHTML = 'Hello World';
        }
    </script>
</head>

<body>
    <button onclick="onClick()">Show more</button>
    <p id="output"></p>
</body>

</html>
